name: Price Alerts Pinger

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping-check-price-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: POST check-price-alerts
        shell: bash
        run: |
          set -euo pipefail

          URL="https://wvmgtgeoemnkhcbvxeqw.functions.supabase.co/check-price-alerts"
          BODY='{"limit":20,"force":false}'

          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --data "$BODY")

          echo "HTTP_CODE=$HTTP_CODE"
          echo "Response body:"
          cat response.json

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Expected HTTP 200 but received $HTTP_CODE"
            exit 1
          fi
